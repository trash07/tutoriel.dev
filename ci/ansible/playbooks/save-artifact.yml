---
- name: Save build artifact
  become: false
  hosts: servers
  gather_facts: false
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  tasks:
    - name: Compress
      community.general.archive:
        path:
          - ci/
          - public/
        dest: /tmp/artifact.tar.bz2
        format: bz2
        force_archive: true
